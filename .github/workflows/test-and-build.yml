name: Test and Build

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  load-matrix:
    uses: ./.github/workflows/load-matrix.yml
    with:
      file: .github/matrix.json

  test-and-build:
    needs: load-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine package version
        if: always()
        run: |
          ref_name="${GITHUB_REF_NAME:-}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "$ref_name" ]; then
            version="$ref_name"
          else
            latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)
            short_sha=$(git rev-parse --short HEAD)
            if [ -n "$latest_tag" ]; then
              version="${latest_tag}+$short_sha"
            else
              version="$short_sha"
            fi
          fi
          echo "PACKAGE_VERSION=$version" >> "$GITHUB_ENV"

      - name: Common setup
        uses: ./.github/actions/setup-beam
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Run tests
        run: make tests CT_LOGS_DIR=logs current_rmq_ref=${{ matrix.rabbitmq }}

      - name: Upload logs if tests fail
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-rabbitmq-${{ matrix.rabbitmq }}
          path: logs/

      - name: Build release artifact
        if: success()
        run: make dist DIST_AS_EZS=1 current_rmq_ref=${{ matrix.rabbitmq }}

      - name: Package release
        if: success()
        run: |
          mkdir -p package/plugins
          cp plugins/seventh_state_pauser-*.ez package/plugins/
          tar -czf "seventh-state-pauser-${{ env.PACKAGE_VERSION }}-rabbitmq-${{ matrix.rabbitmq }}.tar.gz" -C package .

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: seventh-state-pauser-${{ env.PACKAGE_VERSION }}-rabbitmq-${{ matrix.rabbitmq }}
          path: seventh-state-pauser-${{ env.PACKAGE_VERSION }}-rabbitmq-${{ matrix.rabbitmq }}.tar.gz
